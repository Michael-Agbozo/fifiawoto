[variables]
NIXPACKS_PHP_VERSION = "8.2"

[phases.setup]
cmds = ["mkdir -p /var/log/nginx"]

[phases.install]
cmds = ["composer install --no-dev --no-interaction --ignore-platform-reqs", "npm install --legacy-peer-deps"]

[start]
cmd = "node /assets/scripts/prestart.mjs /assets/nginx.template.conf /nginx.conf && nginx -c /nginx.conf"
